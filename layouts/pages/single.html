{{ define "main" }}
  {{- $hasToc := and .Params.toc (gt (len .TableOfContents) 100) }}
  <div class="page-layout{{ if not $hasToc }} no-toc{{ end }}">

    <article class="content-main">
      <div class="content-card">

        <header class="post-header">
          <h1 class="post-title">{{ .Title }}</h1>
          {{- with .Description }}
            <p class="page-description">{{ . }}</p>
          {{- end }}
        </header>

        <hr class="post-divider">

        <div class="post-body">
          {{ .Content }}
        </div>

      </div>
    </article>

    {{- partial "sidebar-toc.html" . }}

  </div>
{{ end }}
