<header class="site-header">
  <div class="container">
    <a href="{{ "/" | relURL }}" class="site-brand" aria-label="{{ .Site.Title }} home">
      {{- if .Site.Params.avatar }}
        <img src="{{ .Site.Params.avatar }}" alt="{{ .Site.Title }}" class="site-avatar">
      {{- end }}
      <span class="site-brand-name">{{ .Site.Title }}</span>
      {{- with .Site.Params.tagline }}
        <span class="site-brand-tagline">— {{ . }}</span>
      {{- end }}
    </a>

    <nav class="site-nav" aria-label="Main navigation">
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        {{/* Sun icon — shown in dark mode */}}
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
          <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
          <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
        </svg>
        {{/* Moon icon — shown in light mode */}}
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

      {{- $currentPage := . }}
      {{- range .Site.Menus.main }}
        {{- $isActive := or ($currentPage.IsMenuCurrent "main" .) ($currentPage.HasMenuCurrent "main" .) }}
        <a href="{{ .URL | relURL }}"
           {{- if $isActive }} class="active" aria-current="page"{{ end }}>
          {{ .Name }}
        </a>
      {{- end }}
    </nav>
  </div>
</header>
